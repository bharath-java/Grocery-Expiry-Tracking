name: grocery_expiry_tracker
description: A native mobile app for smart grocery expiry tracking with local and push notifications.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  image_picker: ^1.0.7
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  camera: ^0.10.5+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
