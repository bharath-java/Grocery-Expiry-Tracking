name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Template and Wrappers
        run: |
          flutter create --platforms=android --org com.groceryexpirytracker clean_app
          cp -r clean_app/android/gradlew mobile/android/
          cp -r clean_app/android/gradlew.bat mobile/android/
          cp -r clean_app/android/gradle mobile/android/
          mkdir -p mobile/android/app/src/main/res
          cp -r clean_app/android/app/src/main/res/mipmap-* mobile/android/app/src/main/res/

      - name: Install Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grocery-expiry-tracker-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
