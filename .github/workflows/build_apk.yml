name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android Project Template
        run: |
          cd mobile
          flutter create --platforms=android --org com.groceryexpirytracker --project-name mobile .

      - name: Patch Android Project Configuration
        run: |
          cd mobile
          python -c "
          import os
          settings_path = 'android/settings.gradle'
          if os.path.exists(settings_path):
              with open(settings_path, 'r') as f:
                  content = f.read()
              if 'com.google.gms.google-services' not in content:
                  lines = content.split('\n')
                  for i, line in enumerate(lines):
                      if 'plugins {' in line:
                          lines.insert(i + 1, '    id \"com.google.gms.google-services\" version \"4.3.15\" apply false')
                          break
                  with open(settings_path, 'w') as f:
                      f.write('\n'.join(lines))

          build_gradle_path = 'android/app/build.gradle'
          if os.path.exists(build_gradle_path):
              with open(build_gradle_path, 'a') as f:
                  f.write(\"\n\nif (file('google-services.json').exists()) {\n    apply plugin: 'com.google.gms.google-services'\n}\n\")
          "

      - name: Apply Custom AndroidManifest
        run: |
          cp mobile/android_custom/AndroidManifest.xml mobile/android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grocery-expiry-tracker-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
