name: E2E Functionality & Security Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-web:
    name: Web E2E Testing (Selenium Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tests/web/package.json

      - name: Install Dependencies
        run: |
          cd tests/web
          npm install

      - name: Run Web E2E Tests
        run: |
          cd tests/web
          npm run test

      - name: Upload Web E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E_Test_Report_Web
          path: tests/reports/E2E_Test_Report_Web.xlsx

  test-mobile:
    name: Mobile E2E Testing (Appium Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: tests/app/requirements.txt

      - name: Install Dependencies
        run: |
          cd tests/app
          pip install -r requirements.txt

      - name: Run Mobile E2E Tests
        run: |
          cd tests/app
          python appium_test.py

      - name: Upload Mobile E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E_Test_Report_App
          path: tests/reports/E2E_Test_Report_App.xlsx
